apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-313-pip-template-copy
  title: Python 3.13 Pip Template Copy
  description: Create a new Python 3.13 Pip microservice using the scaffolding-templates with OpenTelemetry observability
  tags:
    - python
    - pip
    - microservice
    - observability
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Basic Information
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

    - title: Service Configuration
      required:
        - product
        - product_family
      properties:
        product:
          title: Product
          type: string
          description: Product name
          default: test-product
        product_family:
          title: Product Family
          type: string
          description: Product family/line
          default: test-product-family
        class_name:
          title: Main Class Name
          type: string
          description: Main class name for the application
          default: Application

    - title: Deployment Configuration
      properties:
        cloud_provider:
          title: Cloud Provider
          type: string
          enum:
            - aws
            - gcp
            - azure
          default: aws
        cloud_region:
          title: Cloud Region
          type: string
          description: Deployment region
          default: us-east-1
        namespace:
          title: Kubernetes Namespace
          type: string
          description: Namespace for deployment
          default: default
        eks_cluster_identifier:
          title: EKS Cluster Identifier
          type: string
          description: EKS cluster identifier for routing
          default: dev

  steps:
    # Step 1: Generate repository using cookiecutter with provided parameters
    - id: generate-from-template
      name: Generate Repository from Template
      action: fetch:template
      input:
        url: ./scaffolding-templates-main/python-313-pip-template-copy
        targetPath: ./generated
        cookiecutterCompat: true
        values:
          git_repo_name: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          app_name: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          org: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          product: ${{ parameters.product }}
          product_family: ${{ parameters.product_family }}
          class_name: ${{ parameters.class_name }}
          cloud_provider: ${{ parameters.cloud_provider }}
          cloud_region: ${{ parameters.cloud_region }}
          namespace: ${{ parameters.namespace }}
          eks_cluster_identifier: ${{ parameters.eks_cluster_identifier }}
          argo_app_name: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          service_region: ${{ parameters.cloud_region }}
          customer: "internal"
          github_team: "engineering"
          lifecycle: "development"
          code_owner: "engineering"
          customer_facing: "false"
          product_suite: "test-suite"
          product_short_name: "test"
          tier: "dev"
          customer_domain: "internal.test.com"
          account: "123456789"
          port_team: "engineering"
          port_description: "Test service"
          slack_url: "https://slack.test.com"
          repo_type: "service"
          port_product: "test-product"
          harbor_project_name: "test-project"
          provision_to_multi_account: "false"
          region_code: "use1"

    - id: list-generated-root
      name: List Generated Root
      action: fs:readdir
      input:
        paths: 
          - ./generated
 
    - id: list-generated-repo
      name: List Generated Repo
      action: fs:readdir
      input:
        paths: 
          - ./generated/${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: log-generated-tree
      name: Log Generated Tree
      action: debug:log
      input:
        message: >-
          ${{ { generatedRoot: steps['list-generated-root'].output, generatedRepo: steps['list-generated-repo'].output } | dump }}

    # Step 3: Add catalog info file to the generated repository
    - id: add-catalog-info
      name: Add Catalog Info
      action: fetch:template:file
      input:
        url: ./content/catalog-info.yaml
        targetPath: ./generated/${{ (parameters.repoUrl | parseRepoUrl).repo }}/catalog-info.yaml
        values:
          name: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          description: 'Microservice generated from scaffolding-templates'

    # Step 4: Create local Git repository
    - id: create-local-repo
      name: Create Local Repository
      action: debug:log
      input:
        message: 'Repository created locally at: generated/${{ (parameters.repoUrl | parseRepoUrl).repo }}'

    - id: persist-local-repo
      name: Persist Local Repository
      action: repo:persist:local
      input:
        sourcePath: ./generated/${{ (parameters.repoUrl | parseRepoUrl).repo }}
        targetPath: ./generated/${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: 'Microservice generated from backstage-demoapp scaffolding-repo-templates'
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        sourcePath: ./generated/${{ (parameters.repoUrl | parseRepoUrl).repo }}

    # Step 5: Register the new component in the Backstage catalog
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    # Step 6: Send notification
    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Repository Created Successfully (Local/GitHub)'
        info: 'Your new microservice ${{ (parameters.repoUrl | parseRepoUrl).repo }} has been published to GitHub and registered in the catalog.'
        severity: 'normal'

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
