name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mock dependencies installation
        run: |
          echo "Mock: Installing dependencies..."
          echo "Mock: python3 -m pip install --upgrade pip"
          echo "Mock: pip3 install -r requirements.txt"
          echo "Mock: pip3 install flake8 coverage"

      - name: Mock Build
        run: |
          echo "Mock: Building project..."
          echo "Mock: python3 -m compileall src"
          echo "Build completed successfully (mock)"

      - name: Mock Test with coverage
        run: |
          echo "Mock: Running tests with coverage..."
          echo "Mock: coverage run -m pytest -q"
          echo "Mock: coverage xml -o coverage.xml"
          echo "Mock: coverage report"
          echo "Tests passed (mock)"
          mkdir -p .
          echo "coverage-report-mock" > coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  tag-and-release:
    if: ${{ github.actor != 'nektos/act' }}
    needs: lint-build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Package source as release artifact
        run: |
          mkdir -p dist
          echo "demoapp release v${{ steps.tag_version.outputs.new_tag }}" > release-info.txt
          zip "dist/demoapp-${{ steps.tag_version.outputs.new_tag }}.zip" release-info.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true
          files: dist/*.zip

  build-image-artifact:
    if: ${{ github.actor != 'nektos/act' }}
    needs: tag-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mock Docker Buildx setup
        run: |
          echo "Mock: Setting up Docker Buildx..."
          echo "Docker Buildx setup completed (mock)"

      - name: Mock Docker image build
        run: |
          echo "Mock: Building Docker image demoapp:${{ needs.tag-and-release.outputs.new_tag }}..."
          echo "Mock: docker/build-push-action would build the image"
          echo "Docker image build completed (mock)"

      - name: Mock save image as artifact
        run: |
          echo "Mock: Saving Docker image to artifact..."
          echo "docker save 'demoapp:${{ needs.tag-and-release.outputs.new_tag }}' -o demoapp-image.tar" > demoapp-image.tar
          echo "Image artifact saved (mock)"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ needs.tag-and-release.outputs.new_tag }}
          path: demoapp-image.tar
          retention-days: 14

  deploy:
    if: ${{ github.actor != 'nektos/act' }}
    needs: [tag-and-release, build-image-artifact]
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Simulate deployment
        run: |
          echo "Deploying demoapp ${{ needs.tag-and-release.outputs.new_tag }} to production (simulated)."
          echo "No real infrastructure target is configured — replace this step with an actual deploy command when one exists."
